<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Trail</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        background: #f5f5f7;
      }

      html[data-theme="dark"],
      html[data-theme="dark"] body,
      html[data-theme="dark"] #root,
      html[data-theme="tomorrow-night"],
      html[data-theme="tomorrow-night"] body,
      html[data-theme="tomorrow-night"] #root,
      html[data-theme="catppuccin-mocha"],
      html[data-theme="catppuccin-mocha"] body,
      html[data-theme="catppuccin-mocha"] #root {
        background: #1e2028;
      }
    </style>
    <script>
      (() => {
        try {
          const themeBases = {
            light: "light",
            dark: "dark",
            "ft-dark": "dark",
            "tomorrow-night": "tomorrow-night",
            "catppuccin-mocha": "catppuccin-mocha",
            obsidian: "dark",
            graphite: "dark",
            midnight: "dark",
            onyx: "dark",
            "clean-white": "light",
            "warm-paper": "light",
            stone: "light",
            sand: "light",
          };
          const storedTheme = window.localStorage.getItem("codetrail-theme");
          const baseTheme = themeBases[storedTheme];
          if (baseTheme) {
            document.documentElement.dataset.theme = baseTheme;
            document.documentElement.dataset.themeVariant = storedTheme;
          }
        } catch {
          // Ignore storage errors at bootstrap.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
